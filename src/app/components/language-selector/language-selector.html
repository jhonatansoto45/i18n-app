<p class="mt-10">{{ "changeLanguage" | translate }}!</p>

<select
  class="flex"
  name="language"
  id="language"
  [value]="currentLang()"
  (change)="changeLanguage($event)"
>
  @for (language of languages(); track language.code) {
  <option [value]="language.code">{{language.code}} {{ language.flag }}</option>
  }
</select>
